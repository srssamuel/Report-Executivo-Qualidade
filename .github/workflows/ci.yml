name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**', 'integ/**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://rirkdpsyuvhumuhejofv.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_PPUFHkZ2rbLk5Id0N93DsQ_kHWGQWeC

      - name: Health check endpoint exists
        run: |
          test -f app/api/health/route.ts && echo "✅ Health endpoint present" || echo "❌ Missing health endpoint"
